<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#071631" />
    <meta name="description" content="Cloud Quest — a pocket-sized sky adventure." />
    <title>Cloud Quest</title>
  </head>
  <body>
    <main id="app">
      <header class="hud" aria-label="Game status">
        <div><span class="hud-label">Stars</span><strong id="score">0</strong></div>
        <div class="brand">CLOUD QUEST</div>
        <div><span class="hud-label">Shields</span><strong id="lives">3</strong></div>
      </header>

      <section class="game-shell" aria-label="Cloud Quest game">
        <canvas id="game" aria-label="Touch and drag to fly, collect stars, and dodge storm clouds"></canvas>
        <div id="overlay" class="overlay">
          <div class="eyebrow">A POCKET SKY ADVENTURE</div>
          <h1 id="overlay-title">Cloud Quest</h1>
          <p id="overlay-message">Drag to steer your glider. Collect stars and avoid the storm clouds.</p>
          <button id="action" type="button">Launch</button>
          <p class="best">Best flight: <span id="best">0</span> stars</p>
        </div>
      </section>

      <footer>Drag or use arrow keys to steer</footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
